# Render Blueprint — deploy the Express API from /server
# https://render.com/docs/blueprint-spec
#
# IMPORTANT — Start Command must be exactly: npm start
# Do NOT use: npm run dev, node --watch, or concurrently (those fail on Render and show "Waiting for file changes").
# Root Directory must stay "server" so package.json from /server is used.
#
# After connecting this repo, add these in the Render dashboard (Environment):
#   MONGODB_URI   — same as local server/.env (Atlas connection string)
#   JWT_SECRET    — long random string (match nothing sensitive in git)
#   CLIENT_ORIGIN — https://YOUR-APP.vercel.app  (comma-separate if you also use localhost)
#
# Then in Vercel: VITE_API_URL = your Render service URL (https://auth-api-xxxx.onrender.com), no trailing slash — Redeploy.

services:
  - type: web
    name: auth-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: USE_IN_MEMORY_DB
        value: "false"
